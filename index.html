<!DOCTYPE html>
<html>
<head>
    <title>Korku Evi</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
        #joystick {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 100px;
            height: 100px;
            background: rgba(255,0,0,0.3);
            border: 2px solid red;
            border-radius: 50%;
            z-index: 100;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="info">🏚️ KORKU EVİ | Hikayeni koy | WASD + Joystick</div>
    <div id="joystick"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ---------- SAHNE ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // ---------- IŞIKLAR ----------
        const light = new THREE.PointLight(0xffaa66, 1, 20);
        light.position.set(0, 5, 0);
        scene.add(light);
        
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        
        // ---------- ZEMİN ----------
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x335533 })
        );
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // ---------- EV (BASİT AMA GRANNY TARZI) ----------
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
        
        // Duvarlar
        const walls = [
            { pos: [0, 1.5, -5], size: [10, 3, 0.3] }, // arka
            { pos: [0, 1.5, 5], size: [10, 3, 0.3] }, // ön
            { pos: [-5, 1.5, 0], size: [0.3, 3, 10] }, // sol
            { pos: [5, 1.5, 0], size: [0.3, 3, 10] } // sağ
        ];
        
        walls.forEach(w => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(...w.size), wallMaterial);
            mesh.position.set(...w.pos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
        });
        
        // Kapı
        const door = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 2.2, 0.2),
            new THREE.MeshStandardMaterial({ color: 0x8B4513 })
        );
        door.position.set(0, 1.1, 4.9);
        door.castShadow = true;
        door.receiveShadow = true;
        scene.add(door);
        
        // Kapı kolu
        const knob = new THREE.Mesh(
            new THREE.SphereGeometry(0.1),
            new THREE.MeshStandardMaterial({ color: 0xffaa00 })
        );
        knob.position.set(0.6, 1.1, 4.9);
        knob.castShadow = true;
        scene.add(knob);
        
        // ---------- MOBİLYALAR ----------
        // Masa
        const table = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.2, 1),
            new THREE.MeshStandardMaterial({ color: 0x996633 })
        );
        table.position.set(-2, 0.6, -2);
        table.castShadow = true;
        table.receiveShadow = true;
        scene.add(table);
        
        // Sandalye
        const chair = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.8, 0.6),
            new THREE.MeshStandardMaterial({ color: 0x885522 })
        );
        chair.position.set(-2.5, 0.4, -2);
        chair.castShadow = true;
        chair.receiveShadow = true;
        scene.add(chair);
        
        // Yatak
        const bed = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.5, 1.5),
            new THREE.MeshStandardMaterial({ color: 0x774411 })
        );
        bed.position.set(2, 0.25, 2);
        bed.castShadow = true;
        bed.receiveShadow = true;
        scene.add(bed);
        
        // Dolap
        const closet = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 2, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x664422 })
        );
        closet.position.set(3, 1, -3);
        closet.castShadow = true;
        closet.receiveShadow = true;
        scene.add(closet);
        
        // ---------- KONTROLLER ----------
        const keys = {};
        let joystick = { active: false, x: 0, y: 0 };
        
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);
        
        // Joystick
        const stick = document.getElementById('joystick');
        stick.addEventListener('touchstart', () => joystick.active = true);
        stick.addEventListener('touchend', () => {
            joystick.active = false;
            joystick.x = 0;
            joystick.y = 0;
        });
        stick.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = stick.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            joystick.x = (touch.clientX - centerX) / (rect.width/2);
            joystick.y = -(touch.clientY - centerY) / (rect.height/2);
            
            if (Math.abs(joystick.x) > 1) joystick.x = Math.sign(joystick.x);
            if (Math.abs(joystick.y) > 1) joystick.y = Math.sign(joystick.y);
        });
        
        // ---------- OYUN DÖNGÜSÜ ----------
        let playerPos = { x: 0, z: 0 };
        
        function update() {
            // Hareket (WASD)
            let moveX = 0, moveZ = 0;
            if (keys['w']) moveZ += 0.1;
            if (keys['s']) moveZ -= 0.1;
            if (keys['a']) moveX -= 0.1;
            if (keys['d']) moveX += 0.1;
            
            // Joystick
            if (joystick.active) {
                moveX += joystick.x * 0.1;
                moveZ += joystick.y * 0.1;
            }
            
            // Kameraya göre hareket
            if (moveX !== 0 || moveZ !== 0) {
                const angle = camera.rotation.y;
                playerPos.x += moveX * Math.cos(angle) - moveZ * Math.sin(angle);
                playerPos.z += moveX * Math.sin(angle) + moveZ * Math.cos(angle);
                
                // Sınırlar
                playerPos.x = Math.max(-4, Math.min(4, playerPos.x));
                playerPos.z = Math.max(-4, Math.min(4, playerPos.z));
                
                camera.position.x = playerPos.x;
                camera.position.z = playerPos.z;
            }
            
            // Fare ile bakış
            if (document.pointerLockElement) {
                // Fare hareketi
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        
        update();
        
        // Fare kilidi
        document.addEventListener('click', () => {
            document.body.requestPointerLock();
        });
        
        // Fare hareketi
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, camera.rotation.x));
            }
        });
        
        // Pencere boyutu
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
