<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Razel Super Soccer Pro</title>
    <style>
        body { margin: 0; background: #1e8449; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; flex-direction: column; align-items: center; color: white; pointer-events: none; }
        .timer { font-size: 24px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; }
        .score-row { display: flex; gap: 20px; margin-top: 5px; font-size: 20px; }
        
        canvas { display: block; background: #2ecc71; }

        /* Mobil Kontroller */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .joy-area { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .joy-stick { width: 50px; height: 50px; background: white; border-radius: 50%; transition: 0.1s; }
        .btn-group { display: flex; gap: 15px; align-items: flex-end; }
        .btn { width: 75px; height: 75px; border-radius: 50%; border: 4px solid white; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #shoot { background: #e74c3c; } #pass { background: #3498db; width: 60px; height: 60px; }

        #goal-anim { display: none; position: fixed; top: 40%; width: 100%; text-align: center; font-size: 80px; color: yellow; text-shadow: 5px 5px black; z-index: 100; animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="timer" id="timeDisplay">02:00</div>
        <div class="score-row">
            <span style="color:#3498db">TR: <span id="s1">0</span></span>
            <span style="color:#e74c3c">RAKİP: <span id="s2">0</span></span>
        </div>
    </div>

    <div id="goal-anim">GOOOOOL!</div>

    <canvas id="game"></canvas>

    <div class="controls">
        <div class="joy-area" id="joyZone"><div class="joy-stick" id="stick"></div></div>
        <div class="btn-group">
            <div class="btn" id="pass">PAS</div>
            <div class="btn" id="shoot">ŞUT</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Oyun Ayarları
        let time = 120;
        let score = [0, 0];
        let gameActive = true;
        let ballOwner = null;

        // Fizik Nesneleri
        let ball = { x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0, r: 12 };
        let players = [
            { id:0, name: "Razel", x: 150, y: canvas.height/2, r: 25, team: 0, color: "#3498db", speed: 4, vx:0, vy:0 },
            { id:1, name: "Yapay Zeka 1", x: 150, y: canvas.height/3, team: 0, color: "#3498db", speed: 3.5, vx:0, vy:0 },
            { id:2, name: "Rakip 1", x: canvas.width-150, y: canvas.height/2, team: 1, color: "#e74c3c", speed: 3.8, vx:0, vy:0 },
            { id:3, name: "Rakip 2", x: canvas.width-150, y: canvas.height/3, team: 1, color: "#e74c3c", speed: 3.5, vx:0, vy:0 }
        ];

        // Joystick ve Kontroller
        let joy = { active: false, x: 0, y: 0 };
        document.getElementById('joyZone').ontouchstart = () => joy.active = true;
        window.ontouchend = () => { joy.active = false; joy.x = 0; joy.y = 0; document.getElementById('stick').style.transform = 'translate(0,0)'; };
        window.ontouchmove = (e) => {
            if(!joy.active) return;
            let rect = document.getElementById('joyZone').getBoundingClientRect();
            let dx = e.touches[0].clientX - (rect.left + 60);
            let dy = e.touches[0].clientY - (rect.top + 60);
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
            let angle = Math.atan2(dy, dx);
            joy.x = Math.cos(angle); joy.y = Math.sin(angle);
            document.getElementById('stick').style.transform = `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
        };

        // Şut ve Pas
        document.getElementById('shoot').ontouchstart = () => kick(15);
        document.getElementById('pass').ontouchstart = () => kick(8);

        function kick(force) {
            if(ballOwner === players[0]) {
                ball.vx = joy.x * force || 10;
                ball.vy = joy.y * force || 0;
                ballOwner = null;
            }
        }

        // Oyun Döngüsü
        function update() {
            if(!gameActive) return;

            // 1. Oyuncu Kontrolü
            players[0].vx = joy.x * players[0].speed;
            players[0].vy = joy.y * players[0].speed;

            // Yapay Zeka (Basit Rakip Takibi)
            players.slice(1).forEach(p => {
                let target = ballOwner ? ballOwner : ball;
                let dx = target.x - p.x; let dy = target.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist > 30) {
                    p.vx = (dx/dist) * p.speed; p.vy = (dy/dist) * p.speed;
                }
            });

            // Pozisyon Güncelleme ve Çarpışma
            players.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                
                // Top Çalma / Sürükleme Mantığı
                let dx = ball.x - p.x; let dy = ball.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist < p.r + ball.r) {
                    ballOwner = p; // Topu tutan kişi değişir (Defense)
                }
            });

            if(ballOwner) {
                ball.x = ballOwner.x + (ballOwner.vx * 2);
                ball.y = ballOwner.y + (ballOwner.vy * 2);
                ball.vx = 0; ball.vy = 0;
            } else {
                ball.x += ball.vx; ball.y += ball.vy;
                ball.vx *= 0.97; ball.vy *= 0.97; // Sürtünme
            }

            // Sınırlar ve Gol
            if(ball.y < 50 || ball.y > canvas.height-50) ball.vy *= -0.8;
            if(ball.x < 0) {
                if(ball.y > canvas.height/3 && ball.y < canvas.height*2/3) goal(1);
                else ball.vx *= -0.8;
            }
            if(ball.x > canvas.width) {
                if(ball.y > canvas.height/3 && ball.y < canvas.height*2/3) goal(0);
                else ball.vx *= -0.8;
            }

            draw();
            requestAnimationFrame(update);
        }

        function goal(team) {
            score[team]++;
            document.getElementById('s1').innerText = score[0];
            document.getElementById('s2').innerText = score[1];
            document.getElementById('goal-anim').style.display = 'block';
            gameActive = false;
            setTimeout(() => {
                resetPositions();
                gameActive = true;
                document.getElementById('goal-anim').style.display = 'none';
            }, 2000);
        }

        function resetPositions() {
            ball = { x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0, r: 12 };
            ballOwner = null;
            players[0].x = 150; players[0].y = canvas.height/2;
            players[2].x = canvas.width-150; players[2].y = canvas.height/2;
        }

        // Zamanlayıcı
        setInterval(() => {
            if(time > 0 && gameActive) {
                time--;
                let m = Math.floor(time/60); let s = time%60;
                document.getElementById('timeDisplay').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            }
        }, 1000);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Saha
            ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 4;
            ctx.strokeRect(0, canvas.height/3, 50, canvas.height/3); // Kale Sol
            ctx.strokeRect(canvas.width-50, canvas.height/3, 50, canvas.height/3); // Kale Sağ
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
            
            // Oyuncular
            players.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "white"; ctx.stroke();
                // Gözler
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(p.x-8, p.y-5, 5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(p.x+8, p.y-5, 5, 0, Math.PI*2); ctx.fill();
            });

            // Top
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        }

        update();
    </script>
</body>
</html>
