<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Granny Pro V1.6 - Construction Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; user-select: none; }
        #overlay {
            position: absolute; top: 10px; left: 10px; color: #000; font-family: sans-serif;
            pointer-events: none; font-weight: bold; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="overlay">GRANNY PRO V1.6 - DEVELOPER: SNOWY DEXRY WEXRY (Light Mode)</div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // --- SAHNE VE AYDINLATMA (Karanlık Kaldırıldı) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Gökyüzü mavisi aydınlık tema
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Güçlü Aydınlatma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); 
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        // --- MATERYALLER ---
        const loader = new THREE.TextureLoader();
        const wallTex = loader.load('https://threejs.org/examples/textures/brick_diffuse.jpg');
        wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
        wallTex.repeat.set(2, 1);
        
        const wallMat = new THREE.MeshStandardMaterial({ map: wallTex });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const stairMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1a });

        const collidableObjects = [];

        // --- YARDIMCI FONKSİYONLAR ---
        function createBox(w, h, d, x, y, z, mat, collidable = true) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            if(collidable) collidableObjects.push(mesh);
            return mesh;
        }

        // --- GERÇEKÇİ MERDİVEN YAPICI ---
        function createStairs(startX, startY, startZ, floorHeight) {
            const stepCount = 12;
            const stepHeight = floorHeight / stepCount;
            const stepDepth = 0.4;
            const stepWidth = 2.5;

            for(let i = 0; i < stepCount; i++) {
                createBox(
                    stepWidth, stepHeight, stepDepth,
                    startX, 
                    startY + (i * stepHeight) + (stepHeight / 2), 
                    startZ - (i * stepDepth),
                    stairMat
                );
            }
        }

        // --- EV İNŞASI ---
        for(let i=0; i<3; i++) {
            const y = i * 4;
            // Kat Zemini
            createBox(20, 0.2, 20, 0, y, 0, floorMat, false);
            
            // Dış Duvarlar
            createBox(20, 4, 0.4, 0, y + 2, -10, wallMat);
            createBox(20, 4, 0.4, 0, y + 2, 10, wallMat);
            createBox(0.4, 4, 20, -10, y + 2, 0, wallMat);
            createBox(0.4, 4, 20, 10, y + 2, 0, wallMat);

            // Kapılı İç Duvar (Örnek)
            if(i < 2) {
                // Sol kanat duvar
                createBox(7, 4, 0.2, -5, y + 2, 0, wallMat);
                // Sağ kanat duvar
                createBox(7, 4, 0.2, 5, y + 2, 0, wallMat);
                // Kapı üstü kiriş (Kapı boşluğu ortada)
                createBox(3, 1, 0.2, 0, y + 3.5, 0, wallMat);
            }
        }

        // Merdivenleri Yerleştir (Katlar Arası)
        createStairs(7, 0, 5, 4); // 0 -> 1. Kat
        createStairs(-7, 4, 5, 4); // 1 -> 2. Kat

        // --- KONTROLLER ---
        let moveTouchId = null, lookTouchId = null;
        let moveStart = new THREE.Vector2(), moveCurrent = new THREE.Vector2();
        let lookLast = new THREE.Vector2();
        let yaw = 0, pitch = 0;
        let velocity = new THREE.Vector3();

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    moveTouchId = t.identifier;
                    moveStart.set(t.clientX, t.clientY);
                    moveCurrent.set(t.clientX, t.clientY);
                } else {
                    lookTouchId = t.identifier;
                    lookLast.set(t.clientX, t.clientY);
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    moveCurrent.set(t.clientX, t.clientY);
                } else if (t.identifier === lookTouchId) {
                    yaw -= (t.clientX - lookLast.x) * 0.004;
                    pitch -= (t.clientY - lookLast.y) * 0.004;
                    pitch = Math.max(-1.45, Math.min(1.45, pitch));
                    lookLast.set(t.clientX, t.clientY);
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) moveTouchId = null;
                if (t.identifier === lookTouchId) lookTouchId = null;
            }
        });

        camera.position.set(0, 1.7, 8);

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            if (moveTouchId !== null) {
                const delta = moveCurrent.clone().sub(moveStart);
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                forward.y = 0; right.y = 0;
                forward.normalize(); right.normalize();

                let nextVel = velocity.clone();
                nextVel.addScaledVector(forward, -delta.y * 0.00008);
                nextVel.addScaledVector(right, delta.x * 0.00008);

                const playerRay = new THREE.Raycaster(camera.position, nextVel.clone().normalize(), 0, 0.7);
                const hits = playerRay.intersectObjects(collidableObjects);
                
                if (hits.length === 0) {
                    velocity.copy(nextVel);
                } else {
                    velocity.set(0,0,0);
                }
            }
            
            camera.position.add(velocity);
            velocity.multiplyScalar(0.85); 
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
