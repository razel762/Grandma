<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabii Creator | Developer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #58a6ff;
            --success: #238636;
            --border: #30363d;
            --text: #c9d1d9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .creator-card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0; color: #ffffff; font-size: 22px; text-transform: uppercase; }
        .header p { font-size: 11px; color: var(--accent); margin-top: 5px; font-weight: bold; }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #8b949e; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: #2ea043; transform: scale(1.02); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #statusArea {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
            border: 1px solid var(--border);
            background: #0d1117;
            white-space: pre-wrap; /* API'den gelen uzun mesajları düzgün gösterir */
        }

        .success-res { border-color: var(--success); color: #3fb950; }
        .error-res { border-color: #f85149; color: #f85149; }
    </style>
</head>
<body>

<div class="creator-card">
    <div class="header">
        <h2>Tabii Account Gen</h2>
        <p>BURAK | DEVELOPER</p>
    </div>

    <div class="form-group">
        <label>Oluşturulacak E-posta</label>
        <input type="text" id="mailInput" placeholder="ornek@mail.com">
    </div>

    <div class="form-group">
        <label>Belirlenecek Şifre</label>
        <input type="password" id="passInput" placeholder="Sifre123">
    </div>

    <button id="genBtn" onclick="olustur()">Hesabı Oluştur</button>

    <div id="statusArea"></div>
</div>

<script>
    async function olustur() {
        const mail = document.getElementById('mailInput').value;
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('genBtn');
        const status = document.getElementById('statusArea');

        if(!mail || !pass) {
            alert("Lütfen tüm alanları doldur!");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> İşlem Yapılıyor...';
        status.style.display = 'none';

        // API Bağlantısı - PASS kısmı tam sonda
        const apiUrl = `https://vexsorgu-api.alwaysdata.net/api/tabiichecker.php?mail=${encodeURIComponent(mail)}&password=${encodeURIComponent(pass)}`;

        try {
            const response = await fetch(apiUrl);
            const data = await response.json();

            status.style.display = 'block';
            
            // API başarılı bir şekilde hesap oluşturduğunda genellikle bir mesaj veya obje döner
            if (data) {
                status.className = 'success-res';
                // API'den gelen tüm yanıtı ekrana basıyoruz ki ne olduğunu gör
                status.innerHTML = `<strong>Sonuç:</strong><br>${JSON.stringify(data, null, 2)}`;
            }

        } catch (error) {
            status.style.display = 'block';
            status.className = 'error-res';
            status.innerHTML = `<strong>Hata:</strong> API yanıt vermedi.<br>CORS engeli olabilir veya API geçici olarak kapalıdır.`;
            console.error("Hata:", error);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Hesabı Oluştur';
        }
    }
</script>

</body>
</html>
