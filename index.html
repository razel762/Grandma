<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Countryball Soccer Mobile</title>
    <style>
        body { margin: 0; padding: 0; background: #2ecc71; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-size: 20px; font-weight: bold; pointer-events: none; }
        canvas { display: block; background: #27ae60; }
        
        /* Mobil Kontroller */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .joystick-zone { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        #joystick { width: 50px; height: 50px; background: white; border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        #shoot-btn { width: 80px; height: 80px; background: #e74c3c; border: 4px solid white; border-radius: 50%; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="ui">RAZEL LEAGUE | GOL: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="joystick-zone" id="joyZone">
            <div id="joystick"></div>
        </div>
        <div id="shoot-btn">ŞUT</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let player = { x: 100, y: canvas.height/2, r: 35, color: "#e74c3c", vx: 0, vy: 0 };
        let ball = { x: canvas.width/2, y: canvas.height/2, r: 20, vx: 0, vy: 0 };
        
        // Hareket Değişkenleri
        let joyActive = false;
        let joyX = 0, joyY = 0;

        // Joystick Mantığı
        const joyZone = document.getElementById('joyZone');
        const joystick = document.getElementById('joystick');

        joyZone.addEventListener('touchstart', (e) => { joyActive = true; });
        window.addEventListener('touchend', () => { 
            joyActive = false; 
            player.vx = 0; player.vy = 0;
            joystick.style.transform = `translate(0px, 0px)`;
        });

        window.addEventListener('touchmove', (e) => {
            if (!joyActive) return;
            let touch = e.touches[0];
            let rect = joyZone.getBoundingClientRect();
            let centerX = rect.left + rect.width/2;
            let centerY = rect.top + rect.height/2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            let maxDist = 40;

            if (dist > maxDist) {
                dx *= maxDist / dist;
                dy *= maxDist / dist;
            }

            joystick.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = dx * 0.15;
            player.vy = dy * 0.15;
        });

        // Şut Butonu
        document.getElementById('shoot-btn').addEventListener('touchstart', () => {
            let dx = ball.x - player.x;
            let dy = ball.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 70) { // Topa yakınsa vur
                ball.vx = dx * 0.5;
                ball.vy = dy * 0.5;
            }
        });

        function update() {
            // Oyuncu Hareket
            player.x += player.vx;
            player.y += player.vy;

            // Top Hareket & Fizik
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx *= 0.98; ball.vy *= 0.98; // Sürtünme

            // Top ve Oyuncu Çarpışması
            let dx = ball.x - player.x;
            let dy = ball.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < player.r + ball.r) {
                ball.vx = dx * 0.2;
                ball.vy = dy * 0.2;
            }

            // Kale ve Gol Kontrolü (Sağ taraf kale)
            if (ball.x > canvas.width - ball.r) {
                if (ball.y > canvas.height/3 && ball.y < (canvas.height/3)*2) {
                    score++;
                    scoreEl.innerText = score;
                    ball.x = canvas.width/2; ball.y = canvas.height/2;
                    ball.vx = 0; ball.vy = 0;
                } else {
                    ball.vx *= -1;
                }
            }
            
            // Sınırlar
            if (ball.x < ball.r) ball.vx *= -1;
            if (ball.y < ball.r || ball.y > canvas.height - ball.r) ball.vy *= -1;

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Saha Çizgileri
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 5;
            ctx.strokeRect(0, canvas.height/3, canvas.width, canvas.height/3);

            // Oyuncu (Countryball)
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; // Gözler
            ctx.beginPath(); ctx.arc(player.x-10, player.y-5, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(player.x+10, player.y-5, 6, 0, Math.PI*2); ctx.fill();

            // Top
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        }

        update();
    </script>
</body>
</html>
