<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece Senin İçin zeynep</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap');

        :root {
            --accent-color: #ff2e63;
            --bg-dark: #080808;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 2s ease;
        }

        
        #timer-box {
            position: absolute;
            top: 30px;
            right: 30px;
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border-right: 4px solid var(--accent-color);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: right;
        }

        .timer-main {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #fff;
            line-height: 1.2;
        }

        #counter {
            color: var(--accent-color);
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: 1.4rem;
        }

        /* Ana Sayfa İçeriği */
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            max-width: 800px;
            transition: all 1s ease;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 30%, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .magic-button {
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            background: transparent;
            border: 2px solid var(--accent-color);
            border-radius: 100px;
            cursor: pointer;
            transition: 0.5s;
        }

        .magic-button:hover {
            background: var(--accent-color);
            box-shadow: 0 0 40px var(--accent-color);
            transform: scale(1.05);
        }

        #surprise-text {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            z-index: 200;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 50px rgba(255,46,99,0.9);
            animation: heartBeat 1.2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: translate(-50%, -50%) scale(1); }
            14% { transform: translate(-50%, -50%) scale(1.1); }
            28% { transform: translate(-50%, -50%) scale(1); }
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="timer-box">
        <div class="timer-main">243 Gün 5844 Saat<br>(8 Aydır) Tanışıyoruz...</div>
        <div id="counter"></div>
    </div>

    <canvas id="stars"></canvas>

    <div class="container" id="main-content">
        <h1>Seninle Her Şey Başka</h1>
        <p>Yaptığım en değerli projelerden bile değerlisin benim için.</p>
        <button class="magic-button" onclick="launchSurprise()">BURAYA TIKLA</button>
    </div>

    <div id="surprise-text">İYİ Kİ VARSIN! ❤️</div>

    <script>
        let totalSeconds = (243 * 24 * 60 * 60); 

        function updateCounter() {
            totalSeconds++;
            const days = Math.floor(totalSeconds / (24 * 3600));
            const hours = Math.floor((totalSeconds % (24 * 3600)) / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            document.getElementById('counter').innerHTML = `${days}G ${hours}S ${mins}D ${secs}S`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let stars = [];
        for(let i=0; i<150; i++) {
            stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5});
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y -= s.speed; if(s.y<0) s.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();

        function launchSurprise() {
            document.body.style.background = "radial-gradient(circle, #3d001f 0%, #000 100%)";
            document.getElementById('main-content').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('main-content').style.display = "none";
                document.getElementById('surprise-text').style.display = "block";
            }, 600);
        }
    </script>
</body>
</html>
