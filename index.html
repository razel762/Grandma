<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Granny Pro - Profesyonel Touch Kontrol</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; user-select: none; }
        #overlay {
            position: absolute; top: 10px; left: 10px; color: #666; font-family: sans-serif;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="overlay">Granny Test v1.0 - Developer: SNOWY DEXRY WEXRY</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.12);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Kasvetli Işık (El Feneri Etkisi)
        const flashLight = new THREE.SpotLight(0xffffff, 2, 15, Math.PI/4, 0.5);
        camera.add(flashLight);
        camera.add(flashLight.target);
        flashLight.target.position.z = -1;
        scene.add(camera);

        // --- 3 KATLI EV ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x221a15 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x110d0a });

        function createFloor(y) {
            const group = new THREE.Group();
            // Zemin
            const floor = new THREE.Mesh(new THREE.BoxGeometry(20, 0.2, 20), floorMat);
            floor.position.y = y;
            group.add(floor);
            // Dış Duvarlar
            const wallData = [[0, -10, 20, 0.4], [0, 10, 20, 0.4], [-10, 0, 0.4, 20], [10, 0, 0.4, 20]];
            wallData.forEach(d => {
                const w = new THREE.Mesh(new THREE.BoxGeometry(d[2], 4, d[3]), wallMat);
                w.position.set(d[0], y + 2, d[1]);
                group.add(w);
            });
            return group;
        }

        for(let i=0; i<3; i++) scene.add(createFloor(i * 4));

        // Merdiven Rampaları
        const stairMat = new THREE.MeshStandardMaterial({ color: 0x332211 });
        for(let i=0; i<2; i++) {
            const s = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 8), stairMat);
            s.rotation.x = -0.55;
            s.position.set(6, (i*4)+2, 0);
            scene.add(s);
        }

        // --- PROFESYONEL DOKUNMATİK KONTROLLER ---
        let moveTouchId = null, lookTouchId = null;
        let moveStart = new THREE.Vector2(), moveCurrent = new THREE.Vector2();
        let lookLast = new THREE.Vector2();
        let yaw = 0, pitch = 0;
        let velocity = new THREE.Vector3();

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.clientX < window.innerWidth / 2 && moveTouchId === null) {
                    moveTouchId = t.identifier;
                    moveStart.set(t.clientX, t.clientY);
                    moveCurrent.set(t.clientX, t.clientY);
                } else if (t.clientX >= window.innerWidth / 2 && lookTouchId === null) {
                    lookTouchId = t.identifier;
                    lookLast.set(t.clientX, t.clientY);
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === moveTouchId) {
                    moveCurrent.set(t.clientX, t.clientY);
                } else if (t.identifier === lookTouchId) {
                    const dx = t.clientX - lookLast.x;
                    const dy = t.clientY - lookLast.y;
                    
                    yaw -= dx * 0.004; // Dönüş hızı
                    pitch -= dy * 0.004;
                    pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
                    
                    lookLast.set(t.clientX, t.clientY);
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.identifier === moveTouchId) { moveTouchId = null; }
                if (t.identifier === lookTouchId) { lookTouchId = null; }
            }
        });

        camera.position.set(0, 1.7, 5);

        function animate() {
            requestAnimationFrame(animate);

            // Bakış Güncelleme
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // Hareket Hesaplama
            if (moveTouchId !== null) {
                const dirX = moveCurrent.x - moveStart.x;
                const dirZ = moveCurrent.y - moveStart.y;
                
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                forward.y = 0; right.y = 0; 
                forward.normalize(); right.normalize();

                const speed = 0.0015; // Yürüme hassasiyeti
                velocity.addScaledVector(forward, -dirZ * speed);
                velocity.addScaledVector(right, dirX * speed);
            }

            camera.position.add(velocity);
            velocity.multiplyScalar(0.85); // Yumuşak duruş (Sürtünme)

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
